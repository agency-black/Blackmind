                }

                const main = document.querySelector('main');
                if (main) {
                    main.style.width = '100%';
                    main.style.maxWidth = '100%';
                    main.style.flex = '1 1 100%';
                }
            })();
        `;

        const resolveCurrentChatwootAccountId = () => {
            const currentUrl = typeof wvLeft.getURL === 'function'
                ? wvLeft.getURL()
                : wvLeft.getAttribute('src') || `${CHATWOOT_BASE_URL}/app`;
            const match = currentUrl.match(/\/app\/accounts\/(\d+)/);
            return match?.[1] || '1';
        };

        const normalizeChatwootUrl = (path) => {
            if (!path) return `${CHATWOOT_BASE_URL}/app`;
            if (/^https?:\/\//.test(path)) return path;

            const accountId = resolveCurrentChatwootAccountId();
            const resolvedPath = path.replace(':accountId', accountId);

            if (resolvedPath.startsWith('/app')) {
                return `${CHATWOOT_BASE_URL}${resolvedPath}`;
            }

            if (resolvedPath.startsWith('/')) {
                return `${CHATWOOT_BASE_URL}${resolvedPath}`;
            }

            return `${CHATWOOT_BASE_URL}/${resolvedPath}`;
        };

        const isChatwootUrl = (url) => {
            return typeof url === 'string' && url.startsWith(CHATWOOT_BASE_URL);
        };

        const applyChatwootShellStyles = (webview) => {
            if (!webview || typeof webview.executeJavaScript !== 'function') return;
            webview.executeJavaScript(CHATWOOT_SIDEBAR_SHELL_SCRIPT).catch((error) => {
                console.warn('Failed to apply Chatwoot shell styles:', error);
            });
        };

        const maybeApplyChatwootShellStyles = (webview) => {
            if (!webview) return;

            const currentUrl = typeof webview.getURL === 'function'
                ? webview.getURL()
                : webview.getAttribute('src') || '';

            if (!isChatwootUrl(currentUrl)) return;
            applyChatwootShellStyles(webview);
        };

        const navigateMainDashboardRoute = (path) => {
            const targetUrl = normalizeChatwootUrl(path);
            const performNavigation = () => {
                hideAllPaneLoaders();
                showPaneLoader('left');
                wvLeft.style.opacity = '0';

                const onStopLoading = () => {
                    maybeApplyChatwootShellStyles(wvLeft);
                    setTimeout(() => {
                        hidePaneLoader('left');
                        wvLeft.style.opacity = '1';
                    }, 100);
                    wvLeft.removeEventListener('did-stop-loading', onStopLoading);
                };

                wvLeft.addEventListener('did-stop-loading', onStopLoading);

                try {
                    wvLeft.loadURL(targetUrl);
                } catch (error) {
                    console.warn('Failed to navigate main dashboard route:', targetUrl, error);
                    wvLeft.src = targetUrl;
                }
            };

            if (activeTabId || isSplitLikeMode()) {
                switchToMainApp();
                setTimeout(performNavigation, 720);
            } else {
                performNavigation();
            }

            setDockState('closed');
        };

        wvLeft.setAttribute('useragent', MODERN_UA);
        wvLeft.addEventListener('did-finish-load', () => console.log('Main webview loaded'));
        wvLeft.addEventListener('dom-ready', () => maybeApplyChatwootShellStyles(wvLeft));
        wvLeft.addEventListener('did-stop-loading', () => maybeApplyChatwootShellStyles(wvLeft));
        wvLeft.addEventListener('focus', () => {
            closeDockIfOpen();
            setFocusedPane('left');
        });
        wvLeft.addEventListener('will-navigate', (e) => {
            if (!e?.url) return;

            if (openAuthPopupForTab(null, e.url, typeof wvLeft.getTitle === 'function' ? wvLeft.getTitle() : '')) {
                if (typeof e.preventDefault === 'function') {
                    e.preventDefault();
                }
            }
        });
        wvLeft.addEventListener('new-window', (e) => {
            if (typeof e.preventDefault === 'function') {
                e.preventDefault();
            }

            if (openAuthPopupForTab(null, e.url, typeof wvLeft.getTitle === 'function' ? wvLeft.getTitle() : '', e.features || '')) {
                return;
            }

            if (e?.url) {
                try {
                    wvLeft.loadURL(e.url);
                } catch (error) {
                    console.warn('Failed to load popup URL in main webview:', e.url, error);
                }
            }
        });

        const paneLeft = document.getElementById('pane-left');
        const paneRight = document.getElementById('pane-right');
        if (paneLeft) {
            paneLeft.addEventListener('mousedown', () => {
                closeDockIfOpen();
                setFocusedPane('left');
            });
        }
        if (paneRight) {
            paneRight.addEventListener('mousedown', () => {
                closeDockIfOpen();
                if (isSplitLikeMode()) setFocusedPane('right');
            });
        }

        splitTrigger.addEventListener('click', () => {
            if (viewMode === 'split') {
                animateSplitRatio(1.0);
                hideTabOverview();
                removeLegacySplitWebview();
                hideAllPaneLoaders();

                let leftVisibleTab = tabs.find(t => getTabPane(t) === 'left');
                const dashboardWv = document.getElementById('wv-left');

                if (leftVisibleTab) {
                    tabs.forEach((tab) => {
                        if (tab.id !== leftVisibleTab.id) {
                            tab.container?.classList.remove('active');
                        }
                    });

                    if (activeTabId === leftVisibleTab.id) {
                        leftVisibleTab.container?.classList.add('active');
                        wvLeft.style.pointerEvents = 'none';
                        wvLeft.style.opacity = '0';
                        setFocusedPane('left', { notify: false });
                        notifyTabsUpdate();
                    } else {
                        switchTab(leftVisibleTab.id);
                    }
                } else {
                    tabs.forEach((tab) => {
                        tab.container?.classList.remove('active');
                    });
                    activeTabId = null;
                    if (dashboardWv) {
                        dashboardWv.style.pointerEvents = 'auto';
                        dashboardWv.style.opacity = '1';
                    }
                    setFocusedPane('left', { notify: false });
                    notifyTabsUpdate();
                }
            } else {
                if (tabs.length === 0) {
                    const splitUrl = 'https://www.google.com';
                    animateSplitRatio(0.5);
                    hideTabOverview();
                    addNewTab(splitUrl, { pane: 'right', autoSplit: false });
                } else if (tabs.length === 1) {
                    animateSplitRatio(0.5);
                    removeLegacySplitWebview();
                    const singleTab = tabs[0];
                    moveTabToPane(singleTab, 'right');
                    hideAllPaneLoaders();
                    showPaneLoader('right');

                    const dashboardWv = document.getElementById('wv-left');
                    if (dashboardWv) {
                        dashboardWv.style.pointerEvents = 'auto';
                        dashboardWv.style.opacity = '1';
                    }

                    setTimeout(() => {
                        singleTab.container?.classList.add('active');
                        hidePaneLoader('right', 250);
                    }, 60);

                    activeTabId = singleTab.id;
                    setFocusedPane('right', { notify: false });
                    hideTabOverview();
                    saveAppState();
                    notifyTabsUpdate();
                } else if (tabs.length === 2) {
                    animateSplitRatio(0.5);
                    removeLegacySplitWebview();
                    const active = tabs.find(t => t.id === activeTabId);
                    const rightTab = active || tabs[1];
                    const leftTab = tabs.find(t => t.id !== rightTab.id) || tabs[0];
                    showSplitPair(leftTab, rightTab);
                } else {
                    animateSplitRatio(0.5);
                    removeLegacySplitWebview();
                    showTabOverview();
                }
            }
        });

        if (homeTrigger) {
            homeTrigger.addEventListener('click', () => {
                const wvLeft = document.getElementById('wv-left');

                if (wvLeft && wvLeft.src !== 'http://127.0.0.1:3001') {
                    // Show loader with smooth fade in
                    hideAllPaneLoaders();
                    showPaneLoader('left');

                    // Smooth crossfade: fade out current webview
                    wvLeft.style.opacity = '0';

                    // After fade out, change URL
                    setTimeout(() => {
                        // Set up listener for when dashboard loads
                        const onStopLoading = () => {
                            setTimeout(() => {
                                // Smooth fade out loader
                                hidePaneLoader('left');
                                // Smooth fade in webview
                                wvLeft.style.opacity = '1';
                            }, 100);
                            wvLeft.removeEventListener('did-stop-loading', onStopLoading);
                        };

                        wvLeft.addEventListener('did-stop-loading', onStopLoading);
                        wvLeft.src = 'http://127.0.0.1:3001';
                    }, 600);
                }
                switchToMainApp();
                setDockState('closed');
            });
        }

        if (browserTrigger) {
            browserTrigger.addEventListener('click', () => {
                openUrlFullscreen('https://www.google.com');
                setDockState('closed');
            });
        }

        const getActiveWebview = () => {
            const actionPane = getActionPane();
            const paneTab = getVisibleTabForPane(actionPane);
            if (paneTab?.webview) return paneTab.webview;

            const leftTab = getVisibleTabForPane('left');
            if (leftTab?.webview) return leftTab.webview;

            return document.getElementById('wv-left');
        };

        let bookmarksCache = [];

        const notifyBookmarksUpdated = () => {
            window.dispatchEvent(new CustomEvent('bookmarks-updated'));
        };

        const getActiveBookmarkPayload = () => {
            const wv = getActiveWebview();
            const activeTab = activeTabId ? tabs.find((tab) => tab.id === activeTabId) : null;
            const currentUrl = activeTab?.url
                || (wv && typeof wv.getURL === 'function' ? wv.getURL() : '')
                || '';
            const normalizedUrl = normalizeNavigableUrl(currentUrl, currentUrl);
            if (!normalizedUrl) return null;

            const currentTitle = activeTab?.title
                || (wv && typeof wv.getTitle === 'function' ? wv.getTitle() : '')
                || normalizedUrl;

            return {
                url: normalizedUrl,
                title: currentTitle,
            };
        };

        const updateBookmarkButtonState = () => {
            if (!tBookmark) return;

            const payload = getActiveBookmarkPayload();
            const isBookmarked = Boolean(
                payload?.url
                && bookmarksCache.some((bookmark) => bookmark?.url === payload.url)
            );

            tBookmark.dataset.bookmarked = isBookmarked ? 'true' : 'false';
        };

        const loadBookmarks = async () => {
            const items = await window.electronAPI?.bookmarks?.list?.();
            bookmarksCache = Array.isArray(items) ? items : [];
            updateBookmarkButtonState();
        };

        const addActivePageToBookmarks = async () => {
            const payload = getActiveBookmarkPayload();
            if (!payload) return;
            await window.electronAPI?.bookmarks?.add?.(payload.url, payload.title);
            notifyBookmarksUpdated();
        };

        const tSearch = document.getElementById('toolbar-search');
        const tBack = document.getElementById('toolbar-share'); // Usado como Atrás
        const tRefresh = document.getElementById('toolbar-refresh');
        const tForward = document.getElementById('toolbar-action'); // Usado como Adelante
        const tBookmark = document.getElementById('toolbar-bookmark');

        window.addEventListener('bookmarks-updated', () => {
            void loadBookmarks();
        });
        void loadBookmarks();

        const searchModal = document.getElementById('search-modal');

        if (tSearch && searchModal) {
            tSearch.onclick = (e) => {
                e.stopPropagation();
                searchModal.classList.add('active');
                document.body.classList.add('search-modal-open');
                setTimeout(() => {
                    const input = document.querySelector('#search-react-root input');
                    if (input instanceof HTMLInputElement) {
                        input.focus();
                    }
                }, 150);
            };
        }

        // Exponer addNewTab globalmente
        window.addNewTab = addNewTab;
        window.navigateMainDashboardRoute = navigateMainDashboardRoute;

        // Cerrar modal al hacer click en el backdrop
        if (searchModal) {
            searchModal.addEventListener('click', (e) => {
                if (e.target === searchModal) {
                    searchModal.classList.remove('active');
                    document.body.classList.remove('search-modal-open');
                }
            });
        }

        window.electronAPI?.authPopup?.onCompleted?.((payload) => {
            const sourceTabId = payload?.sourceTabId;
            const tab = sourceTabId ? tabs.find((existingTab) => existingTab.id === sourceTabId) : null;
            const targetWebview = tab?.webview || getActiveWebview();

            if (targetWebview && typeof targetWebview.reload === 'function') {
                setTimeout(() => {
                    targetWebview.reload();
                }, 120);
            }
        });

        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 'p') {
                e.preventDefault();
            }
        });

        if (tBack) tBack.onclick = () => {
            const wv = getActiveWebview();
            if (wv && wv.canGoBack()) {
                wv.goBack();
            } else {
                console.log('No hay historial para ir atrás');
            }
        };

        if (tRefresh) tRefresh.onclick = () => {
            const wv = getActiveWebview();
            if (wv) wv.reload();
        };

        if (tBookmark) tBookmark.onclick = async () => {
            await addActivePageToBookmarks();
        };

        // Add tab button
        const addTabBtn = document.getElementById('add-tab-trigger');
        if (addTabBtn) {
            addTabBtn.onclick = (e) => {
                e.stopPropagation();
                const overviewOpen = isTabOverviewVisible();
                const pane = overviewOpen ? getTabOverviewPane() : getActionPane();
                if (overviewOpen) {
                    setFocusedPane(pane, { notify: false });
                }
                addNewTab('https://www.google.com', { pane, autoSplit: false, keepOverviewOpen: false });
                if (overviewOpen) hideTabOverview();
            };
        }

        const openTabFromOverview = (tabId) => {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab) return;
            const overviewPane = getTabOverviewPane();

            if (isSplitLikeMode()) {
                const oppositePane = overviewPane === 'right' ? 'left' : 'right';
                const oppositeVisibleTab = getVisibleTabForPane(oppositePane);
                if (oppositeVisibleTab && oppositeVisibleTab.id === tab.id) {
                    setFocusedPane(overviewPane, { notify: false });
                    hideTabOverview();
                    return;
                }

                moveTabToPane(tab, overviewPane);
                setFocusedPane(overviewPane, { notify: false });
                switchTab(tab.id);
                hideTabOverview();
                return;
            }

            switchTab(tab.id);
            hideTabOverview();
        };

        const showTabOverview = () => {
            const overview = document.getElementById('tab-overview');
            const grid = document.getElementById('overview-grid');
            if (!overview || !grid) return;

            const overviewPane = getTabOverviewPane();
            setFocusedPane(overviewPane, { notify: false });

            grid.innerHTML = '';

            const overviewTabs = getTabOverviewCandidates();

            overviewTabs.forEach(tab => {
                const card = document.createElement('div');
                card.className = 'tab-card';
                card.dataset.tabId = tab.id;
                card.onclick = () => {
                    openTabFromOverview(tab.id);
                };

                const header = document.createElement('div');
                header.className = 'tab-card-header';

                if (isSafeImageUrl(tab.favicon)) {
                    const favicon = document.createElement('img');
                    favicon.className = 'tab-card-favicon';
                    favicon.alt = '';
                    favicon.src = tab.favicon;
                    favicon.referrerPolicy = 'no-referrer';
                    header.appendChild(favicon);
                } else {
                    const fallback = document.createElement('span');
                    fallback.className = 'tab-card-favicon-fallback';
                    fallback.setAttribute('aria-hidden', 'true');
                    header.appendChild(fallback);
                }

                const title = document.createElement('span');
                title.className = 'tab-card-title';
                title.textContent = tab.title || 'Nueva Pestaña';
                header.appendChild(title);

                const body = document.createElement('div');
                body.className = 'tab-card-body';
                body.appendChild(createTabCardPreviewNode(tab));

                card.appendChild(header);
                card.appendChild(body);
                grid.appendChild(card);
                scheduleTabPreviewCapture(tab, 0);
            });

            // Add (+) button
            const addCard = document.createElement('div');
            addCard.className = 'tab-card tab-card-add';
            const plus = document.createElement('span');
            plus.className = 'plus-icon';
            plus.textContent = '+';
            addCard.appendChild(plus);
            addCard.onclick = () => {
                const pane = isTabOverviewVisible() ? getTabOverviewPane() : getActionPane();
                setFocusedPane(pane, { notify: false });
                addNewTab('https://www.google.com', { pane, autoSplit: false, keepOverviewOpen: false });
                hideTabOverview();
            };
            grid.appendChild(addCard);

            overview.style.display = 'flex';
            syncLayoutMode();
            startTabOverviewPreviewLoop();
            saveAppState();
        };

        const hideTabOverview = () => {
            const overview = document.getElementById('tab-overview');
            if (overview) overview.style.display = 'none';
            stopTabOverviewPreviewLoop();
            syncLayoutMode();
            saveAppState();
        };

        if (tForward) tForward.onclick = () => {
            const wv = getActiveWebview();
            if (wv && wv.canGoForward()) {
                wv.goForward();
            } else {
                console.log('No hay historial para ir adelante');
            }
        };

        // ===========================================
        // Context Menu Implementation
        // ===========================================

        // Subscribe to context menu actions
        const contextMenuUnsubscribe = window.electronAPI?.contextMenu?.onAction((event, action) => {
            handleContextMenuAction(action);
        });

        const detectContextMenu = (e) => {
            const target = e.target;

            // Check for link
            const link = target.closest('a');
            if (link && link.href && !link.href.startsWith('javascript:')) {
                return { type: 'link', data: { url: link.href, text: link.textContent?.trim() || link.href } };
            }

            // Check for image
            if (target.tagName === 'IMG' && target.src) {
                return { type: 'image', data: { src: target.src, alt: target.alt || '' } };
            }

            // Check for input/textarea
            if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA') {
                const input = target;
                const hasSelection = input.selectionStart !== input.selectionEnd;
                return {
                    type: 'input',
                    data: {
                        hasSelection,
                        isEditable: !input.readOnly,
                        value: input.value
                    }
                };
            }

            // Check for text selection
            const selection = window.getSelection();
            if (selection && selection.toString().length > 0) {
                return { type: 'text', data: { selectedText: selection.toString() } };
            }

            // Default navigation context
            return { type: 'navigation', data: {} };
        };

        // Complete context menu action handler
        const handleContextMenuAction = (actionData) => {
            const { action, data } = actionData;
            console.log('Context menu action:', action, data);

            try {
                switch (action) {
                    // === CLIPBOARD ===
                    case 'copy':
                    case 'copyLink':
                    case 'copyLinkText':
                    case 'copyImageUrl':
                    case 'copyVideoUrl':
                    case 'copyAudioUrl':
                    case 'copyPageUrl':
                    case 'copyTabUrl':
                    case 'copyFrameUrl':
                        const textToCopy = data?.text || data?.url || data?.src;
                        if (textToCopy) {
                            navigator.clipboard.writeText(textToCopy);
                        }
                        break;

                    case 'paste':
                        navigator.clipboard.readText().then(text => {
                            document.execCommand('insertText', false, text);
                        }).catch(err => console.error('Paste failed:', err));
                        break;

                    case 'cut':
                        document.execCommand('cut');
                        break;

                    case 'delete':
                        document.execCommand('delete');
                        break;

                    case 'selectAll':
                    case 'select-all':
                        document.execCommand('selectAll');
                        break;

                    case 'undo':
                        document.execCommand('undo');
                        break;

                    case 'redo':
                        document.execCommand('redo');
                        break;

                    // === NAVIGATION ===
                    case 'go-back':
                    case 'goBack':
                        {
                            const wv = getActiveWebview();
                            if (wv && wv.canGoBack && wv.canGoBack()) {
                                wv.goBack();
                            }
                        }
                        break;

                    case 'go-forward':
                    case 'goForward':
                        {
                            const wv = getActiveWebview();
                            if (wv && wv.canGoForward && wv.canGoForward()) {
                                wv.goForward();
                            }
                        }
                        break;

                    case 'reload':
                        {
                            const wv = getActiveWebview();
                            if (wv) wv.reload();
                        }
                        break;

                    case 'reload-no-cache':
                        {
                            const wv = getActiveWebview();
                            if (wv) wv.reloadIgnoringCache();
                        }
                        break;

                    // === LINK ===
                    case 'open-link':
                        if (data?.url) {
                            const wv = getActiveWebview();
                            if (wv) wv.src = data.url;
                        }
                        break;

                    case 'open-link-new-tab':
                        if (data?.url) {
                            const oppositePane = getActionPane() === 'left' ? 'right' : 'left';
                            addNewTab(data.url, { pane: oppositePane, autoSplit: !isSplitLikeMode() });
                        }
                        break;

                    case 'open-link-background':
                        if (data?.url) {
                            addNewTab(data.url, { pane: 'left', activate: false });
                        }
                        break;

                    case 'open-link-split-pane':
                        if (data?.url) {
                            addNewTab(data.url, { pane: 'right', autoSplit: true });
                        }
                        break;

                    case 'open-link-new-window':
                        if (data?.url) {
                            window.electronAPI?.shell?.openExternal?.(data.url);
                        }
                        break;

                    case 'copy-link':
                    case 'copy-link-html':
                        if (data?.url) {
                            navigator.clipboard.writeText(data.url);
                        }
                        break;

                    // === IMAGE ===
                    case 'open-image':
                    case 'open-image-new-tab':
                        if (data?.src) {
                            addNewTab(data.src, { pane: 'left' });
                        }
                        break;

                    case 'open-image-background':
                        if (data?.src) {
                            const oppositePane = getActionPane() === 'left' ? 'right' : 'left';
                            addNewTab(data.src, { pane: oppositePane, autoSplit: false });
                        }
                        break;

                    case 'save-image-as':
                    case 'download-image':
                        if (data?.src) {
                            window.electronAPI?.downloads?.saveImage?.(data.src, data.alt || 'image.jpg');
                        }
                        break;

                    case 'copy-image':
                        if (data?.src) {
                            window.electronAPI?.clipboard?.writeImage?.(data.src);
                        }
                        break;

                    case 'copy-image-url':
                    case 'copy-image-address':
                        if (data?.src) {
                            navigator.clipboard.writeText(data.src);
                        }
                        break;

                    case 'search-image-with-google':
                        if (data?.src) {
                            addNewTab(`https://www.google.com/searchbyimage?image_url=${encodeURIComponent(data.src)}`, { pane: 'left' });
                        }
                        break;

                    // === VIDEO/AUDIO ===
                    case 'toggle-video-play-pause':
                    case 'toggle-audio-play-pause':
                    case 'play-pause':
                        {
                            const mediaEl = document.querySelector('video:not([paused])') || document.querySelector('video');
                            if (mediaEl) {
                                mediaEl.paused ? mediaEl.play() : mediaEl.pause();
                            }
                        }
                        break;

                    case 'toggle-video-mute':
                    case 'toggle-audio-mute':
                        {
                            const mediaEl = document.querySelector('video') || document.querySelector('audio');
                            if (mediaEl) mediaEl.muted = !mediaEl.muted;
                        }
                        break;

                    case 'toggle-video-loop':
                    case 'toggle-audio-loop':
                        {
                            const mediaEl = document.querySelector('video') || document.querySelector('audio');
                            if (mediaEl) mediaEl.loop = !mediaEl.loop;
                        }
                        break;

                    case 'set-video-speed':
                    case 'set-audio-speed':
                        {
                            const mediaEl = document.querySelector('video') || document.querySelector('audio');
                            if (mediaEl && data?.speed) mediaEl.playbackRate = data.speed;
                        }
                        break;

                    case 'toggle-video-pip':
                        {
                            const video = document.querySelector('video');
                            if (video) {
                                if (document.pictureInPictureElement) {
                                    document.exitPictureInPicture();
                                } else if (video.requestPictureInPicture) {
                                    video.requestPictureInPicture();
                                }
                            }
                        }
                        break;

                    case 'toggle-video-fullscreen':
                    case 'video-fullscreen':
                        {
                            const video = document.querySelector('video');
                            if (video) {
                                if (document.fullscreenElement) {
                                    document.exitFullscreen();
                                } else {
                                    video.requestFullscreen();
                                }
                            }
                        }
                        break;

                    case 'video-previous-frame':
                    case 'video-next-frame':
                        {
                            const video = document.querySelector('video');
                            if (video) {
                                const delta = action.includes('previous') ? -1 / 30 : 1 / 30;
                                video.currentTime += delta;
                            }
                        }
                        break;

                    case 'save-video-as':
                        if (data?.src) {
                            window.electronAPI?.downloads?.saveVideo?.(data.src);
                        }
                        break;

                    case 'save-audio-as':
                        if (data?.src) {
                            window.electronAPI?.downloads?.saveAudio?.(data.src);
                        }
                        break;

                    // === SEARCH/TRANSLATE ===
                    case 'search-google':
                        if (data?.text) {
                            addNewTab(`https://www.google.com/search?q=${encodeURIComponent(data.text)}`, { pane: 'left' });
                        }
                        break;

                    case 'translate':
                        if (data?.text) {
                            window.electronAPI?.dictionary?.translate?.(data?.text, 'es');
                        }
                        break;

                    case 'define':
                        if (data?.text) {
                            window.electronAPI?.dictionary?.define?.(data?.text);
                        }
                        break;

                    case 'read-aloud':
                        if (data?.text && 'speechSynthesis' in window) {
                            const utterance = new SpeechSynthesisUtterance(data.text);
                            speechSynthesis.speak(utterance);
                        }
                        break;

                    // === SHARE ===
                    case 'share':
                        window.electronAPI?.share?.share?.(data);
                        break;

                    // === TABS ===
                    case 'new-tab':
                        addNewTab(data?.url || 'https://www.google.com', { pane: data?.pane || getActionPane() });
                        break;

                    case 'reload-tab':
                        {
                            const tabToReload = tabs.find(t => t.id === data?.tabId);
                            if (tabToReload?.webview) tabToReload.webview.reload();
                        }
                        break;

                    case 'duplicate-tab':
                        {
                            const tabToDup = tabs.find(t => t.id === data?.tabId);
                            if (tabToDup?.url) addNewTab(tabToDup.url, { pane: getActionPane() });
                        }
                        break;

                    case 'close-tab':
                        if (data?.tabId) {
                            window.dispatchEvent(new CustomEvent('close-tab', { detail: { tabId: data.tabId } }));
                        }
                        break;

                    case 'close-other-tabs':
                        {
                            const currentTabId = data?.tabId;
                            tabs.filter(t => t.id !== currentTabId).forEach(t => {
                                window.dispatchEvent(new CustomEvent('close-tab', { detail: { tabId: t.id } }));
                            });
                        }
                        break;

                    case 'close-tabs-left':
                        {
                            const leftIdx = data?.tabIndex;
                            tabs.slice(0, leftIdx).forEach(t => {
                                window.dispatchEvent(new CustomEvent('close-tab', { detail: { tabId: t.id } }));
                            });
                        }
                        break;

                    case 'close-tabs-right':
                        {
                            const rightIdx = data?.tabIndex;
                            tabs.slice(rightIdx + 1).forEach(t => {
                                window.dispatchEvent(new CustomEvent('close-tab', { detail: { tabId: t.id } }));
                            });
                        }
                        break;

                    case 'reopen-closed-tab':
                        window.electronAPI?.history?.popClosedTab?.();
                        break;

                    case 'copy-tab-url':
                        if (data?.url) {
                            navigator.clipboard.writeText(data.url);
                        }
                        break;

                    case 'copy-tab-title':
                        if (data?.title) {
                            navigator.clipboard.writeText(data.title);
                        }
                        break;

                    case 'bookmark-tab':
                    case 'bookmark-page':
                        window.electronAPI?.bookmarks?.add?.(data?.url, data?.title)
                            .then(() => {
                                notifyBookmarksUpdated();
                            });
                        break;

                    // === DEVTOOLS ===
                    case 'inspect':
                    case 'inspect-element':
                        {
                            const wv = getActiveWebview();
                            if (wv?.openDevTools) {
                                wv.openDevTools();
                            }
                        }
                        break;

                    case 'open-devtools':
                    case 'view-console':
                        window.electronAPI?.devTools?.openConsole?.();
                        break;

                    case 'view-source':
                    case 'view-frame-source':
                        window.electronAPI?.devTools?.viewSource?.(data?.url);
                        break;

                    // === DOWNLOADS ===
                    case 'download-file':
                    case 'download':
                    case 'download-video':
                    case 'download-audio':
                    case 'download-link':
                        window.electronAPI?.downloads?.downloadFile?.(data?.src || data?.url);
                        break;

                    // === PASSWORD ===
                    case 'toggle-password-visibility':
                        {
                            const activeEl = document.activeElement;
                            if (activeEl?.tagName === 'INPUT') {
                                activeEl.type = activeEl.type === 'password' ? 'text' : 'password';
                            }
                        }
                        break;

                    case 'generate-password':
                        window.electronAPI?.passwords?.generate?.().then(pwd => {
                            if (pwd) navigator.clipboard.writeText(pwd);
                        });
                        break;

                    // === PAGE ===
                    case 'save-page-as':
                        window.electronAPI?.downloads?.showSaveDialog?.('page.html', [{ name: 'HTML', extensions: ['html', 'htm'] }]);
                        break;

                    case 'print':
                        window.print();
                        break;

                    case 'open-in-browser':
                        window.electronAPI?.shell?.openExternal?.(data?.url);
                        break;

                    default:
                        console.log('Unhandled context menu action:', action, data);
                }
            } catch (error) {
                console.error('Error handling context menu action:', action, error);
            }
        };

        const showContextMenu = async (e, webview = null) => {
            e.preventDefault();

            const context = webview ?
                { type: 'navigation', data: {} } :
                detectContextMenu(e);

            // Get webview navigation state if applicable
            if (webview || context.type === 'navigation') {
                const activeWv = webview || getActiveWebview();
                if (activeWv) {
                    context.data = {
                        ...context.data,
                        canGoBack: activeWv.canGoBack ? activeWv.canGoBack() : false,
                        canGoForward: activeWv.canGoForward ? activeWv.canGoForward() : false,
                        url: activeWv.src || ''
                    };
                }
            }

            try {
                await window.electronAPI?.contextMenu?.show({
                    type: context.type,
                    data: context.data,
                    x: e.clientX,
                    y: e.clientY
                });
            } catch (err) {
                console.error('Context menu failed:', err);
            }
        };

        // Context menu on webviews
        document.addEventListener('contextmenu', (e) => {
            const target = e.target;

            // Check if inside a webview container or webview element
            const webviewContainer = target.closest('.webview-container');
            const webviewEl = target.tagName === 'WEBVIEW' ? target : null;

            if (webviewEl || webviewContainer) {
                showContextMenu(e, webviewEl);
                return;
            }

            // Check if in tab bar area
            const tabEl = target.closest('[data-tab-id]');
            if (tabEl) {
                e.preventDefault();
                const tabId = tabEl.dataset.tabId;
                const tabIndex = tabs.findIndex(t => t.id === tabId);

                window.electronAPI?.contextMenu?.show({
                    type: 'tab',
                    data: { tabId, index: tabIndex, tabCount: tabs.length },
                    x: e.clientX,
                    y: e.clientY
                });
                return;
            }

            // Default context menu for other elements
            showContextMenu(e);
        });

        // Handle context menu on dynamically created webviews
        const originalAddNewTab = window.addNewTab;
        if (typeof originalAddNewTab === 'function') {
            window.addNewTab = function (...args) {
                const result = originalAddNewTab.apply(this, args);
                // Context menu handler will be attached when webview is created
                return result;
            };
        }

        // Attach context menu to existing webviews
        document.querySelectorAll('webview').forEach(wv => {
            wv.addEventListener('context-menu', (e) => {
                e.preventDefault();

                const context = {
                    type: 'navigation',
                    data: {
                        canGoBack: wv.canGoBack ? wv.canGoBack() : false,
                        canGoForward: wv.canGoForward ? wv.canGoForward() : false,
                        url: wv.src || ''
                    }
                };

                // Override with specific context if available
                if (e.params) {
                    if (e.params.linkURL) {
                        context.type = 'link';
                        context.data = {
                            url: e.params.linkURL,
                            text: e.params.linkText || e.params.linkURL,
                            canGoBack: context.data.canGoBack,
                            canGoForward: context.data.canGoForward
                        };
                    } else if (e.params.srcURL && e.params.mediaType === 'image') {
                        context.type = 'image';
                        context.data = {
                            src: e.params.srcURL,
                            alt: e.params.altText || '',
                            canGoBack: context.data.canGoBack,
                            canGoForward: context.data.canGoForward
                        };
                    } else if (e.params.selectionText) {
                        context.type = 'text';
                        context.data = {
                            selectedText: e.params.selectionText,
                            canGoBack: context.data.canGoBack,
                            canGoForward: context.data.canGoForward
                        };
                    } else if (e.params.isEditable) {
                        context.type = 'input';
                        context.data = {
                            isEditable: true,
                            hasSelection: !!e.params.selectionText,
                            canGoBack: context.data.canGoBack,
                            canGoForward: context.data.canGoForward
                        };
                    }
                }

                window.electronAPI.contextMenu.show({
                    type: context.type,
                    data: context.data,
                    x: e.params ? e.params.x : 0,
                    y: e.params ? e.params.y : 0
                }).catch(err => console.error('Context menu error:', err));
            });
        });
    </script>
    <script type="module" src="/src/main.tsx"></script>
    </div>
